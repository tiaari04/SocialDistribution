{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Admin{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  {% block styles %}
  <style>
    /* Burgundy / Red Social Dist admin theme */

    :root {
      /* Neutrals */
      --gray-50:#fdf7f9;
      --gray-100:#fbeff3;
      --gray-200:#f0d8e0;
      --gray-300:#e2c3cf;
      --gray-400:#b68b9b;
      --gray-600:#5b3b47;
      --gray-700:#41262f;
      --gray-800:#2a161c;
      --white:#ffffff;

      /* Brand reds (match stream vibe) */
      --brand-main:#800020;
      --brand-main-soft:#fff0f4;
      --brand-main-hover:#a00030;

      /* Accent greens/rose if needed */
      --green-500:#22c55e;
      --green-600:#16a34a;
      --rose-500:#f97373;
      --rose-600:#e11d48;

      --radius-md:.5rem;
      --radius-lg:.9rem;
      --shadow-sm:0 1px 3px rgba(0,0,0,.08);
      --shadow:0 4px 10px rgba(0,0,0,.12);
    }

    * { box-sizing:border-box; }
    html, body { height:100%; }
    body {
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background:var(--gray-50);
      color:var(--gray-800);
    }

    ul, li { margin:0; padding:0; list-style:none; }
    ul.container {
      max-width:72rem;
      margin-inline:auto;
      padding-inline:1rem;
    }

    ul.row, li.row {
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:.75rem;
    }

    ul.grid, li.grid {
      display:grid;
      gap:1.5rem;
    }

    .cols-1{ grid-template-columns:repeat(1,minmax(0,1fr)); }
    .cols-2{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    .cols-3{ grid-template-columns:repeat(3,minmax(0,1fr)); }
    .cols-6{ grid-template-columns:repeat(6,minmax(0,1fr)); }

    /* ===== Spacing ===== */
    .p-3{ padding:.75rem; }
    .p-4{ padding:1rem; }
    .p-5{ padding:1.25rem; }
    .p-6{ padding:1.5rem; }
    .gap-2{ gap:.5rem; }
    .gap-3{ gap:.75rem; }
    .gap-4{ gap:1rem; }
    .gap-6{ gap:1.5rem; }

    /* ===== Card / surface styles (match post cards) ===== */
    .card{
      background:var(--white);
      border:2px solid var(--brand-main);
      border-radius:1.25rem;
      box-shadow:var(--shadow-sm);
      padding:1.25rem;
    }

    .border{ border:1px solid var(--gray-200); }
    .border-top{ border-top:1px solid var(--gray-200); }
    .rounded{ border-radius:var(--radius-md); }
    .rounded-lg{ border-radius:var(--radius-lg); }
    .shadow{ box-shadow:var(--shadow); }

    /* ===== Type & color ===== */
    .text-sm{ font-size:.875rem; }
    .text-base{ font-size:1rem; }
    .text-xl{ font-size:1.25rem; line-height:1.75rem; }

    .semibold{ font-weight:600; }
    .bold{ font-weight:700; }

    .text-muted{ color:var(--gray-600); }
    .text-strong{ color:var(--gray-800); }
    .text-primary{ color:var(--brand-main); }

    /* ===== Buttons & inputs (burgundy primary) ===== */
    button, a.button{
      cursor:pointer;
      border:none;
      text-decoration:none;
      font-family:inherit;
    }

    .btn{
      display:inline-block;
      padding:.5rem .85rem;
      border-radius:999px;
      font-size:.875rem;
      font-weight:600;
      border:1px solid transparent;
      transition:background-color .15s ease, border-color .15s ease, transform .08s ease;
    }

    .btn-primary{
      background:var(--brand-main);
      color:var(--white);
      border-color:var(--brand-main);
    }
    .btn-primary:hover{
      background:var(--brand-main-hover);
      border-color:var(--brand-main-hover);
      transform:translateY(-1px);
    }

    .btn-outline{
      background:var(--white);
      color:var(--gray-800);
      border-color:var(--gray-300);
    }
    .btn-outline:hover{
      background:var(--gray-100);
    }

    .btn-danger{
      background:var(--rose-600);
      color:var(--white);
      border-color:var(--rose-600);
    }
    .btn-danger:hover{
      background:var(--rose-500);
      border-color:var(--rose-500);
    }

    .btn-success{
      background:var(--green-600);
      color:var(--white);
      border-color:var(--green-600);
    }
    .btn-success:hover{
      background:var(--green-500);
      border-color:var(--green-500);
    }

    input[type="text"],
    input[type="search"],
    input[type="url"],
    input[type="file"],
    select,
    textarea {
      width:100%;
      background:var(--white);
      color:var(--gray-800);
      border:1px solid var(--gray-300);
      border-radius:1rem;
      padding:.55rem .8rem;
      font-size:.875rem;
      outline:none;
      transition:border-color .15s ease, box-shadow .15s ease;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:var(--brand-main);
      box-shadow:0 0 0 2px rgba(128,0,32,0.15);
    }

    /* ===== Top nav (echo post header vibe) ===== */
    ul.nav{
      display:flex;
      gap:1rem;
      padding:0.75rem 1rem;
      background:var(--brand-main-soft);
      border-bottom:2px solid var(--brand-main);
      border-radius:0 0 1.25rem 1.25rem;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      position:sticky;
      top:0;
      z-index:20;
    }

    ul.nav > li{
      padding:.25rem .6rem;
      border-radius:999px;
      font-size:.9rem;
    }

    ul.nav > li a{
      color:var(--gray-700);
      text-decoration:none;
      font-weight:500;
    }

    ul.nav > li.semibold a{
      color:var(--brand-main);
      font-weight:700;
    }

    ul.nav > li.active{
      background:var(--brand-main);
    }
    ul.nav > li.active a{
      color:var(--white);
    }

    ul.nav > li:not(.active):hover{
      background:rgba(128,0,32,0.06);
    }

    /* ===== Table-like headers ===== */
    .header-row{
      background:var(--brand-main-soft);
      color:var(--gray-700);
      border:1px solid var(--gray-200);
      border-radius:var(--radius-lg);
      padding:.75rem 1rem;
    }
    .header-row .cell{
      font-weight:600;
      text-align:left;
    }

    /* ===== Misc helpers ===== */
    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
    }
    .truncate{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
  </style>
  {% endblock %}
</head>
<body>

<ul class="container">
  <!-- ===== Top navigation ===== -->
  <li>
    {% with current=request.resolver_match.url_name %}
    <ul class="nav">
      <li class="semibold"><a href="{% url 'adminpage:dashboard' %}">Admin</a></li>

      <li class="{% if current == 'dashboard' %}active{% endif %}">
        <a href="{% url 'adminpage:dashboard' %}">Dashboard</a>
      </li>
      <li class="{% if current == 'authors' %}active{% endif %}">
        <a href="{% url 'adminpage:authors' %}">Authors</a>
      </li>
      <li class="{% if current == 'pending-users' %}active{% endif %}">
        <a href="{% url 'adminpage:pending-users' %}">Pending</a>
      </li>
      <li class="{% if current == 'images' %}active{% endif %}">
        <a href="{% url 'adminpage:images' %}">Images</a>
      </li>
      <li class="{% if 'federation' in current %}active{% endif %}">
        <a href="{% url 'adminpage:federation-dashboard' %}">Federation</a>
      </li>
      <li class="{% if current == 'stream_home' %}active{% endif %}">
        <a href="{% url 'entries:stream_home' request.user.author.serial %}">Stream</a>
      </li>
    </ul>
    {% endwith %}
  </li>

  <!-- ===== Page content ===== -->
  <li class="p-4">
    {% block content %}{% endblock %}
  </li>
</ul>

</body>
</html>
