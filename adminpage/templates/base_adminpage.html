{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Admin{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  {% block styles %}
  <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        min-height: 100vh;
        background-color: #f9f5f5;
    }

    header {
        position: sticky;
        top: 0;
        left: 0;
        width: 200px;
        height: 100vh;
        background-color: #800020;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 0px;
        border-right: 3px solid #b81042;
        z-index: 100;
        box-sizing: border-box;
    }

    header h2 {
        margin-bottom: 40px;
        font-size: 22px;
        color: #fff;
        text-align: center;
        letter-spacing: 1px;
        font-weight: bold;
    }

    header nav {
        width: 100%;
        display: flex;
        flex-direction: column;
        padding: 0 0;
        box-sizing: border-box;
    }

    header a {
        color: #fff;
        background-color: #9f0030;
        text-decoration: none;
        width: 100%;
        text-align: left;
        font-size: 15px;
        padding: 15px 15px;
        margin-bottom: 10px;
        font-weight: 600;
        letter-spacing: 0.3px;
        transition: background 0.3s, border-left-color 0.2s, padding-left 0.2s;
        box-sizing: border-box;
        border-left: 4px solid transparent;
    }

    header a:hover {
        background-color: #b40036;
        padding-left: 18px;
    }

    /* Active link styling */
    header a.active {
        background-color: #f9f5f5;
        color: #800020;
        border-left-color: #ffd1e4;
        padding-left: 18px;
        font-weight: bold;
    }

    main {
        flex: 1;
        padding: 30px;
        border-left: 2px solid rgba(128,0,32,0.1);
        box-sizing: border-box;
    }
  </style>
  {% endblock %}
</head>
<body>

{% with current=request.resolver_match.url_name %}
<header>
    <h2>Admin</h2>
    <nav>
        <a href="{% url 'adminpage:dashboard' %}"
           class="{% if current == 'dashboard' %}active{% endif %}">
            Dashboard
        </a>

        <a href="{% url 'adminpage:authors' %}"
           class="{% if current == 'authors' %}active{% endif %}">
            Authors
        </a>

        <a href="{% url 'adminpage:pending-users' %}"
           class="{% if current == 'pending-users' %}active{% endif %}">
            Pending Users
        </a>

        <a href="{% url 'adminpage:images' %}"
           class="{% if current == 'images' %}active{% endif %}">
            Images
        </a>

        <a href="{% url 'adminpage:federation-dashboard' %}"
           class="{% if 'federation' in current %}active{% endif %}">
            Federation
        </a>

        <a href="{% url 'entries:stream_home' request.user.author.serial %}"
           class="{% if current == 'stream_home' %}active{% endif %}">
            Stream
        </a>
    </nav>
</header>
{% endwith %}

<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
