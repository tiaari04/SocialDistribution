<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Admin{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <!-- Top Nav -->
  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur">
    <div class="mx-auto max-w-6xl px-4 py-3 flex items-center gap-4">
      <a href="{% url 'adminpage:dashboard' %}" class="font-semibold">Admin</a>
      <nav class="flex gap-4 text-slate-300">
        <a class="hover:text-white" href="{% url 'adminpage:dashboard' %}">Dashboard</a>
        <a class="hover:text-white" href="{% url 'adminpage:images' %}">Images</a>
        <a class="hover:text-white" href="{% url 'adminpage:authors' %}">Authors</a>
        <a class="hover:text-white" href="{% url 'adminpage:pending-users' %}">Approvals</a>
        <a class="hover:text-white" href="/">Site</a>
      </nav>
      <div class="ml-auto">
        {% if request.user.is_authenticated %}
          <span class="inline-flex items-center rounded-full bg-slate-800 px-3 py-1 text-sm text-slate-200">
            {{ request.user.username }}
          </span>
        {% endif %}
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
