{% extends "base_adminpage.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6 text-blue-800">Dashboard</h1>

<div class="grid gap-6 sm:grid-cols-3">
  <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
    <div class="text-gray-500 text-sm">Total Images</div>
    <div class="mt-2 text-3xl font-semibold text-blue-700">{{ total_images }}</div>
  </div>
  <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
    <div class="text-gray-500 text-sm">Total Authors</div>
    <div class="mt-2 text-3xl font-semibold text-blue-700">{{ total_authors }}</div>
  </div>
  <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
    <div class="text-gray-500 text-sm">Pending Users</div>
    <div class="mt-2 text-3xl font-semibold text-blue-700">{{ pending_users }}</div>
  </div>
</div>
{% endblock %}
