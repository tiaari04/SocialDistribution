{% extends "base_adminpage.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6 text-blue-800">Dashboard</h1>

<ul role="list" class="grid gap-6 sm:grid-cols-3">
  <li role="listitem" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
    <ul role="list" class="space-y-2">
      <li role="listitem" class="text-gray-500 text-sm">Total Images</li>
      <li role="listitem" class="text-3xl font-semibold text-blue-700">{{ total_images }}</li>
    </ul>
  </li>

  <li role="listitem" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
    <ul role="list" class="space-y-2">
      <li role="listitem" class="text-gray-500 text-sm">Total Authors</li>
      <li role="listitem" class="text-3xl font-semibold text-blue-700">{{ total_authors }}</li>
    </ul>
  </li>

  <li role="listitem" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
    <ul role="list" class="space-y-2">
      <li role="listitem" class="text-gray-500 text-sm">Pending Users</li>
      <li role="listitem" class="text-3xl font-semibold text-blue-700">{{ pending_users }}</li>
    </ul>
  </li>
</ul>
{% endblock %}
