{% extends "base_adminpage.html" %}
{% block title %}Images{% endblock %}
{% block content %}
<h1 class="text-2xl font-semibold mb-6 text-blue-800">Hosted Images</h1>

<form method="get" class="mb-6 flex gap-2">
  <input
    name="q"
    value="{{ q }}"
    placeholder="Search images..."
    class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
  />
  <button class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-500">
    Search
  </button>
  <a
    href="{% url 'adminpage:image-upload' %}"
    class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm hover:bg-gray-100"
  >
    Upload
  </a>
</form>

<ul role="list" class="w-full text-sm bg-gray-100 text-gray-700 rounded-t-xl border border-gray-200">
  <li role="listitem" class="grid grid-cols-3 gap-2 py-2 px-3">
    <span class="text-left font-medium">Preview</span>
    <span class="text-left font-medium">URL</span>
    <span class="text-left font-medium">Actions</span>
  </li>
</ul>

<ul role="list" class="w-full text-sm border border-t-0 border-gray-200 rounded-b-xl shadow-sm overflow-x-auto">
  {% for i in images %}
  <li role="listitem" class="grid grid-cols-3 gap-2 items-center border-t first:border-t-0 py-2 px-3">
    <span class="h-16 w-16">
      <img src="{{ i.url }}" alt="image" class="h-16 w-16 rounded-md object-cover" />
    </span>


    <span class="text-gray-600 break-all font-mono">{{ i.url }}</span>

    <span class="flex items-center gap-2 justify-start">
      <form action="{% url 'adminpage:image-delete' i.id %}" method="post" onsubmit="return confirm('Delete this image?');">
        {% csrf_token %}
        <button
          class="rounded-lg bg-rose-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-rose-500"
          type="submit"
          aria-label="Delete image {{ i.id }}"
        >
          Delete
        </button>
      </form>
    </span>
  </li>
  {% empty %}
  <li role="listitem" class="py-6 text-center text-gray-400">No images yet.</li>
  {% endfor %}
</ul>
{% endblock %}
