{% load static %}
<style>

    background-color: #f9f5f5;
}

header {
    position: sticky;
    top: 0;

    color: #fff;
    text-align: center;
    letter-spacing: 1px;
    font-weight: bold;
}

header a {
    color: #fff;
    background-color: #b81042;
    text-decoration: none;
    width: 100%;
    text-align: left;
    font-size: 15px;
    padding: 12px 15px; 
    margin-bottom: 10px;
    border-radius: 12px;
    font-weight: 600;

header a:hover {
    background-color: #d51a52; 
    padding-left: 18px;
}
