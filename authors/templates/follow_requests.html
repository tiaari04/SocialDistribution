{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Follow Requests for {{ author.displayName }}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <h1>Follow Requests for {{ author.displayName }}</h1>

    {% if requests %}
        <ul>
        {% for req in requests %}
            <li>
                {{ req.actor.displayName }} wants to follow you.

                <button class="approve-btn" data-author="{{ author.serial }}" data-follower="{{ req.actor.id }}">
                    Approve
                </button>

                <button class="reject-btn" data-author="{{ author.serial }}" data-follower="{{ req.actor.id }}">
                    Reject
                </button>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No pending follow requests.</p>
    {% endif %}

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Helper function to get CSRF token from cookies
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Approve buttons
        document.querySelectorAll('.approve-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const authorSerial = this.dataset.author;
                const followerId = this.dataset.follower;

                fetch(`/api/authors/${authorSerial}/followers/${followerId}/`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    // line 62 should be used for authentication. I haven't tested with the
                    // credentials line yet since I'm not sure what the credential
                    // should be.

                    // credentials: 'include' 
                })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    location.reload(); // Refresh to update the page
                });
            });
        });

        // Reject buttons
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const authorSerial = this.dataset.author;
                const followerId = this.dataset.follower;

                fetch(`/api/authors/${authorSerial}/followers/${followerId}/`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                
                    // line 93 should be used for authentication. I haven't tested with the
                    // credentials line yet since I'm not sure what the credential
                    // should be.
                    
                    // credentials: 'include' 
                })
                .then(response => response.json())
                .then(data => {
                    console.log(data);
                    location.reload(); // Refresh to update the page
                });
            });
        });
    });
    </script>
</body>
</html>
