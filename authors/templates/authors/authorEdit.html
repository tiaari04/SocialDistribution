{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Red Social Dist | Edit Profile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  {% include 'components/sidebar_styles.html' %}
  
  <style>
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .form-container {
      background-color: white;
      padding: 40px;
      border-radius: 20px;
      border: 1px solid #d4a5a5;
      box-shadow: 2px 6px 12px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 800px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 30px;
      color: #800020;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 25px;
    }

    label {
      font-weight: 600;
      color: #800020;
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #d4a5a5;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    input:focus, textarea:focus {
      border-color: #a00030;
      box-shadow: 0 0 0 3px rgba(128, 0, 32, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .full-width {
      grid-column: span 2;
    }

    .center {
      text-align: center;
    }

    button {
      background-color: #800020;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    button:hover {
      background-color: #a00030;
    }

    button:active {
      transform: scale(0.98);
    }

    .back-link {
      display: inline-block;
      margin-top: 25px;
      text-decoration: none;
      color: #800020;
      font-weight: 600;
      transition: color 0.2s;
      text-align: center;
    }

    .back-link:hover {
      color: #a00030;
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .form-container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.75rem;
      }

      form {
        grid-template-columns: 1fr;
      }

      .full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  {% include 'components/sidebar_menu.html' %}

  <main>
    <div class="form-container">
      <h1><i class="fas fa-user-edit"></i> Edit Your Profile</h1>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <section class="full-width">
          <label for="displayName">Display Name</label>
          <input type="text" name="displayName" id="displayName" value="{{ author.displayName }}" required>
        </section>
        
        <section>
          <label for="github">GitHub URL</label>
          <input type="url" name="github" id="github" value="{{ author.github }}" placeholder="https://github.com/username">
        </section>
        
        <section>
          <label for="web">Website</label>
          <input type="url" name="web" id="web" value="{{ author.web }}" placeholder="https://example.com">
        </section>
        
        <section class="full-width">
          <label for="profileImageFile">Upload Profile Image</label>
          <input type="file" name="profileImageFile" id="profileImageFile" accept="image/*">
        </section>
        
        <section class="full-width">
          <label for="description">Description</label>
          <textarea name="description" id="description" rows="4" placeholder="Tell others about yourself...">{{ author.description }}</textarea>
        </section>
        
        <section class="full-width center">
          <button type="submit"><i class="fas fa-save"></i> Save Changes</button>
        </section>
      </form>

      <div class="full-width center">
        <a href="{% url 'authors:detail' author.serial %}" class="back-link">
          <i class="fas fa-arrow-left"></i> Back to Profile
        </a>
      </div>
    </div>
  </main>
</body>
</html>
