{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Social Dist | Awaiting Approval</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f9e5eb, #fce7ed);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    main {
      background-color: white;
      border-radius: 20px;
      border: 2px solid #d4a5a5;
      box-shadow: 2px 6px 12px rgba(0, 0, 0, 0.1);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 550px;
      text-align: center;
    }

    .icon-container {
      font-size: 5rem;
      color: #800020;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #800020;
      margin: 0 0 1rem 0;
    }

    p {
      color: #666;
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 0 0 2rem 0;
    }

    .info-box {
      background-color: #f9f5f5;
      border: 1px solid #d4a5a5;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .info-box p {
      margin: 0;
      color: #374151;
      font-size: 0.95rem;
    }

    .info-box i {
      color: #800020;
      margin-right: 0.5rem;
    }

    footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #d4a5a5;
    }

    footer a {
      color: #800020;
      font-weight: 600;
      text-decoration: none;
      font-size: 1rem;
    }

    footer a:hover {
      color: #a00030;
      text-decoration: underline;
    }

    @media (max-width: 500px) {
      main {
        padding: 2.5rem 2rem;
        margin: 1rem;
      }

      h1 {
        font-size: 1.75rem;
      }

      .icon-container {
        font-size: 4rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="icon-container">
      <i class="fas fa-clock"></i>
    </div>
    
    <h1>Account Pending Approval</h1>
    
    <p>Your account is awaiting approval from an administrator.</p>
    
    <footer>
      <a href="{% url 'login:login' %}">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </footer>
  </main>
</body>
</html>
